<!DOCTYPE html>
<html lang="es">

    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;800&family=Space+Grotesk:wght=700&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden; 
        }
        .brand-font {
            font-family: 'Space Grotesk', sans-serif;
        }
        .custom-scroll::-webkit-scrollbar {
            width: 4px;
            height: 4px;
        }
        .custom-scroll::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.6);
        }
        .custom-scroll::-webkit-scrollbar-thumb {
            background: #f43f5e;
            border-radius: 2px;
        }

        @media screen and (orientation: portrait) {
            .portrait-warning {
                display: flex !important;
            }
        }

        #close-emulator-left {
            position: fixed !important;
            top: 8px !important;
            left: 8px !important;
            z-index: 9999999 !important;
            display: flex !important;
            align-items: center !important;
            justify-content: center !important;
            gap: 4px !important;
            background-color: #ef4444 !important;
            color: #ffffff !important;
            font-family: 'Space Grotesk', sans-serif !important;
            font-weight: 900 !important;
            font-size: 9px !important;
            padding: 5px 9px !important;
            border: 1.5px solid #ffffff !important;
            border-radius: 50px !important;
            box-shadow: 0px 5px 12px rgba(0, 0, 0, 0.6), inset 0px 1px 2px rgba(255,255,255,0.3) !important;
            cursor: pointer !important;
            text-transform: uppercase !important;
            letter-spacing: 0.5px !important;
            transition: transform 0.1s ease, background-color 0.2s ease !important;
        }
        #close-emulator-left:hover { background-color: #dc2626 !important; }
        #close-emulator-left:active { transform: scale(0.95) !important; }

        /* ✅ BARRA DE PROGRESO */
        #progress-bar-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: #1e293b;
            z-index: 999999;
            display: none;
        }
        #progress-bar-fill {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #f43f5e, #ec4899);
            transition: width 0.2s ease;
        }
        #progress-text {
            position: fixed;
            top: 8px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 10px;
            color: #f1f5f9;
            background: rgba(15,23,42,0.85);
            padding: 2px 8px;
            border-radius: 10px;
            z-index: 999999;
            display: none;
        }
    </style>
</head>

    </main>

        if ('serviceWorker' in navigator) {

            const txt = document.getElementById('progress-text');
            bar.style.display = 'block';
            txt.style.display = 'block';
            fill.style.width = porcentaje + '%';
            txt.textContent = texto + ' ' + Math.round(porcentaje) + '%';

            document.getElementById('progress-bar-container').style.display = 'none';

        let activeFilters = { search: '', region: 'all', letter: 'all', genre: 'all', console: 'all' };
        let db;
        const dbRequest = indexedDB.open("RetroOS_ROMs_Cache", 1);
        dbRequest.onupgradeneeded = (e) => {
            let database = e.target.result;
            if (!database.objectStoreNames.contains("roms")) database.createObjectStore("roms", { keyPath: "title" });
        };
        dbRequest.onsuccess = (e) => { db = e.target.result; renderGames(); };

        function cleanString(str) { return str ? str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase() : ''; }
        function toggleFullscreen(enter = true) {
            const d = document.documentElement;
            enter ? (d.requestFullscreen?.() || d.mozRequestFullScreen?.() || d.webkitRequestFullscreen?.() || d.msRequestFullscreen?.())
                  : (document.exitFullscreen?.() || document.mozCancelFullScreen?.() || document.webkitExitFullscreen?.() || document.msExitFullscreen?.());
        }

        function buildConsoleMenu() {
            const menu = document.getElementById('console-menu');
            menu.innerHTML = '';
            Object.keys(consoleDetails).forEach(sysKey => {
                const sys = consoleDetails[sysKey];
                const btn = document.createElement('button');
                btn.dataset.system = sysKey;
                btn.className = "flex items-center gap-2 md:gap-3 px-3 py-1.5 md:py-2.5 rounded-xl text-[11px] font-bold tracking-wide transition-all uppercase shrink-0 text-left w-auto md:w-full border " + 
                    (activeFilters.console === sysKey 
                        ? `bg-gradient-to-r ${sys.color} text-white border-rose-500 shadow-md shadow-black/50` 
                        : "bg-slate-950/40 border-slate-800 text-slate-400 hover:bg-slate-800/50 hover:text-slate-200");
                btn.innerHTML = `<i data-lucide="${sys.icon}" class="w-3.5 h-3.5 shrink-0 ${activeFilters.console === sysKey ? 'text-rose-400' : ''}"></i><span class="whitespace-nowrap truncate">${sys.name}</span>`;
                btn.onclick = () => { activeFilters.console = sysKey; buildConsoleMenu(); renderGames(); };
                menu.appendChild(btn);
            });
            lucide.createIcons();
        }

        function renderGames() {
            const grid = document.getElementById('games-grid');
            const noRes = document.getElementById('no-results');
            grid.innerHTML = '';

            const filtered = gbaDatabase.filter(g => {
                const s = cleanString(activeFilters.search);
                return (!s || cleanString(g.title).includes(s) || cleanString(g.dev).includes(s))
                    && (activeFilters.region === 'all' || g.region === activeFilters.region)
                    && (activeFilters.letter === 'all' || g.title.toUpperCase().startsWith(activeFilters.letter))
                    && (activeFilters.genre === 'all' || g.genre === activeFilters.genre)
                    && (activeFilters.console === 'all' || g.system === activeFilters.console);
            });

            document.getElementById('global-counter').textContent = `${filtered.length} / ${gbaDatabase.length} ROMS`;
            noRes.classList.toggle('hidden', filtered.length > 0);

            filtered.forEach(g => {
                const safe = g.title.replace(/'/g, "\\'");
                const id = safe.replace(/\s+/g, '-').replace(/[^a-zA-Z0-9-]/g, '');
                const card = document.createElement('div');
                card.className = "bg-slate-900/60 backdrop-blur border border-slate-800/80 hover:border-rose-500 rounded-xl p-3 flex flex-col justify-between transition-all group relative overflow-hidden active:scale-[0.98]";
                card.innerHTML = `
                    <div>
                        <div class="flex items-center justify-between gap-1 text-[9px] mb-1 text-slate-400 font-bold">
                            <span class="px-1 py-0.2 bg-slate-950 border border-slate-800 rounded text-rose-400 font-mono">${g.region}</span>
                            <span class="truncate max-w-[60px] uppercase text-slate-500">${g.dev}</span>
                        </div>
                        <h3 class="brand-font text-[11px] font-bold text-slate-100 group-hover:text-rose-400 transition-colors line-clamp-2 leading-tight tracking-wide uppercase">${g.title}</h3>
                    </div>
                    <div class="mt-2 pt-1.5 border-t border-slate-950 flex items-center justify-between">
                        <span class="text-[9px] font-black uppercase text-slate-400 tracking-tighter bg-slate-950 px-1 py-0.5 rounded border border-slate-800">${g.system}</span>
                        <div class="flex gap-1 items-center" id="actions-${id}">
                            <label class="bg-rose-600 hover:bg-rose-500 text-white rounded px-2 py-1 text-[10px] font-bold uppercase transition-colors flex items-center gap-0.5 cursor-pointer">
                                <i data-lucide="upload" class="w-2.5 h-2.5"></i> CARGAR
                                <input type="file" class="hidden" onchange="handleLocalROM(this, '${safe}', '${g.system}')">
                            </label>
                        </div>
                    </div>
                `;
                if (db) {
                    const tx = db.transaction(["roms"], "readonly");
                    tx.objectStore("roms").get(g.title).onsuccess = e => {
                        if (e.target.result) {
                            document.getElementById(`actions-${id}`).innerHTML = `
                                <button onclick="playCachedROM('${safe}', '${g.system}')" class="bg-emerald-600 hover:bg-emerald-500 text-white rounded px-2 py-1 text-[10px] font-bold uppercase transition-colors flex items-center gap-0.5">
                                    <i data-lucide="play" class="w-2.5 h-2.5 fill-white"></i> RUN
                                </button>
                                <label class="bg-slate-800 hover:bg-slate-700 text-slate-300 rounded p-1 text-[10px] font-bold uppercase transition-colors flex items-center cursor-pointer">
                                    <i data-lucide="refresh-cw" class="w-2.5 h-2.5"></i>
                                    <input type="file" class="hidden" onchange="handleLocalROM(this, '${safe}', '${g.system}')">
                                </label>
                            `;
                            lucide.createIcons();
                        }
                    };
                }
                grid.appendChild(card);
            });
            lucide.createIcons();
        }

        // ✅ CARGA CON BARRA DE PROGRESO
        function handleLocalROM(input, gameTitle, consoleType) {
            if (!input.files?.[0]) return;
            const file = input.files[0];
            const reader = new FileReader();

            // Actualizar barra mientras lee el archivo
            reader.onprogress = e => {
                if (e.lengthComputable) {
                    const pct = (e.loaded / e.total) * 100;
                    setProgress(pct, "Leyendo archivo");
                }
            };

            reader.onloadend = () => {
                setProgress(100, "Guardando...");
                if (db) {
                    const tx = db.transaction(["roms"], "readwrite");
                    tx.objectStore("roms").put({ title: gameTitle, fileData: file });
                    tx.oncomplete = () => {
                        hideProgress();
                        const url = URL.createObjectURL(file);
                        launchEmulatorJS(url, gameTitle, consoleType);
                    };
                } else {
                    hideProgress();
                    const url = URL.createObjectURL(file);
                    launchEmulatorJS(url, gameTitle, consoleType);
                }
            };

            reader.readAsArrayBuffer(file);
        }

        function playCachedROM(gameTitle, consoleType) {
            if (!db) return;
            setProgress(10, "Cargando desde caché");
            const tx = db.transaction(["roms"], "readonly");
            tx.objectStore("roms").get(gameTitle).onsuccess = e => {
                hideProgress();
                const rec = e.target.result;
                if (rec?.fileData) {
                    const url = URL.createObjectURL(rec.fileData);
                    launchEmulatorJS(url, gameTitle, consoleType);
                }
            };
        }

        function launchEmulatorJS(romUrl, gameTitle, consoleType) {
            setProgress(30, "Preparando emulador");
            const sec = document.getElementById('emulator-section');
            const cont = document.getElementById('emulator-container');
            document.getElementById('emulator-game-title').textContent = gameTitle;
            document.getElementById('emulated-system-tag').textContent = consoleType;
            sec.classList.remove('hidden');
            toggleFullscreen(true);

            cont.innerHTML = '<div id="ejs-player" style="width:100%;height:100%;"></div>';
            window.EJS_player = '#ejs-player';
            window.EJS_core = consoleType; 
            window.EJS_gameUrl = romUrl; 
            window.EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
            window.EJS_startOnLoaded = true; 
            window.EJS_fullscreenOnStart = true; 
            window.EJS_style = "background:#000;width:100vw;height:100vh;position:fixed;top:0;left:0;z-index:99;margin:0;padding:0;";

            // Simular progreso mientras carga núcleos
            let prog = 30;
            const sim = setInterval(() => {
                prog += Math.random() * 12;
                if (prog >= 95) { prog = 100; clearInterval(sim); setTimeout(hideProgress, 600); }
                setProgress(prog, "Cargando núcleo y datos");
            }, 150);

            const s = document.createElement('script');
            s.src = 'https://cdn.emulatorjs.org/stable/data/loader.js';
            cont.appendChild(s);
        }

        function populateAlphaSelect() {
            const sel = document.getElementById('alpha-select');
            for(let i=65; i<=90; i++) {
                const opt = document.createElement('option');
                opt.value = String.fromCharCode(i);
                opt.textContent = opt.value;
                sel.appendChild(opt);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            populateAlphaSelect();
            buildConsoleMenu();
            renderGames();

            const search = document.getElementById('search-input');
            const clearBtn = document.getElementById('clear-search');

            const forceFS = () => {
                if (!document.fullscreenElement && !document.webkitFullscreenElement && !document.mozFullScreenElement && !document.msFullscreenElement) toggleFullscreen(true);
            };
            window.addEventListener('click', forceFS);
            window.addEventListener('touchstart', forceFS);
            window.addEventListener('focus', forceFS);

            const orientChange = () => { if (window.matchMedia("(orientation: landscape)").matches) toggleFullscreen(true); };
            screen.orientation?.addEventListener('change', orientChange);
            window.addEventListener('orientationchange', orientChange);
            if (window.matchMedia("(orientation: landscape)").matches) setTimeout(()=>toggleFullscreen(true), 500);

            const close = () => window.location.reload();
            document.getElementById('close-emulator').addEventListener('click', close);
            document.getElementById('close-emulator-left').addEventListener('click', close);

            search.addEventListener('input', e => {
                activeFilters.search = e.target.value;
                clearBtn.classList.toggle('hidden', !e.target.value);
                renderGames();
            });
            clearBtn.addEventListener('click', () => {
                search.value = ''; activeFilters.search = '';
                clearBtn.classList.add('hidden'); renderGames();
            });
            document.getElementById('genre-select').addEventListener('change', e => { activeFilters.genre = e.target.value; renderGames(); });
            document.getElementById('region-select').addEventListener('change', e => { activeFilters.region = e.target.value; renderGames(); });
            document.getElementById('alpha-select').addEventListener('change', e => { activeFilters.letter = e.target.value; renderGames(); });
        });
    </script>
</body>
</html>
